<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City 17 Serfers</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; }
    #overlay { position: absolute; top: 10px; left: 10px; font-family: Arial, sans-serif; }
    #gameover { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; }
  </style>
</head>
<body>
  <div id="overlay">
    <div>Score: <span id="score">0</span></div>
    <div id="instructions">Use arrow keys to move left/right. Avoid obstacles!</div>
  </div>
  <div id="gameover">Game Over - Press R to Restart</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.149.0/three.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
